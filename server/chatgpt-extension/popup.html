<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }

    h3 {
      margin: 0 0 12px 0;
      color: #00d4ff;
      font-size: 14px;
    }

    .status {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .status.active {
      background: rgba(0, 212, 100, 0.1);
      border: 1px solid rgba(0, 212, 100, 0.3);
      color: #00d464;
    }

    .status.inactive {
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid rgba(255, 80, 80, 0.3);
      color: #ff5050;
    }

    .info {
      font-size: 11px;
      color: #888;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <h3>🤖 THHFlow ChatGPT Bridge</h3>
  <div id="status" class="status active">⏳ Checking...</div>
  <div class="info">
    This extension bridges your THHFlow with ChatGPT.
    Keep a ChatGPT tab open for best performance.
  </div>
  <script src="popup.js"></script>
</body>

</html>
