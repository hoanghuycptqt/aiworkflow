# VCW Nginx Configuration
# Copy to: /etc/nginx/sites-available/vcw
# Enable: ln -s /etc/nginx/sites-available/vcw /etc/nginx/sites-enabled/vcw

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # Client static files (React build)
    root /opt/vcw/app/client/dist;
    index index.html;

    # API + WebSocket proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout for long-running requests (Puppeteer, job execution)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Socket.IO
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve uploaded files
    location /uploads/ {
        alias /opt/vcw/app/server/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Max upload size (for images/videos)
    client_max_body_size 100M;
}
