name: Deploy to VPS

on:
  push:
    branches: [main]

# Prevent concurrent deploys
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd /opt/vcw/app

            # Pull latest code (track pre-pull HEAD to detect python-broker changes)
            OLD_HEAD=$(git rev-parse HEAD)
            git pull origin main
            NEW_HEAD=$(git rev-parse HEAD)

            # Install dependencies
            npm run install:all

            # Generate Prisma client & apply schema
            cd server && npx prisma generate && npx prisma db push && cd ..

            # Build client
            cd client && npm run build && cd ..

            # Restart broker (systemd) only if python-broker/ changed.
            # Broker holds in-memory state (sessions, cookies); skip restart when
            # the diff is unrelated to keep warm sessions alive.
            if git diff "$OLD_HEAD..$NEW_HEAD" --name-only | grep -q '^python-broker/'; then
              echo "🔄 python-broker changed — restarting vcw-flow-broker"
              sudo systemctl restart vcw-flow-broker
              sleep 5
              curl -sf http://127.0.0.1:8002/healthz > /dev/null && echo "✅ Broker is healthy" || echo "⚠️ Broker may not be responding"
            else
              echo "ℹ️ python-broker unchanged — keeping broker running"
            fi

            # Restart server
            pm2 restart ecosystem.config.cjs --update-env
            pm2 save

            # Health check
            sleep 3
            curl -sf https://thhflow.com/api/auth/me > /dev/null && echo "✅ Server is healthy" || echo "⚠️ Server may not be responding"

            echo "✅ Deploy complete!"

      - name: Notify on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "⚠️ Deploy failed — check GitHub Actions logs"
